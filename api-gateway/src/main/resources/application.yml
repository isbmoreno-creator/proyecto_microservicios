spring:
  application:
    name: api-gateway
  cloud:
    gateway:
          routes:
            - id: msclientes-clientes
              uri: lb://msclientes
              predicates:
                - Path=/clientes/**
            - id: msclientes-direcciones
              uri: lb://msclientes
              predicates:
                - Path=/direcciones/**
            - id: msvehiculos-vehiculos
              uri: lb://msvehiculos
              predicates:
                - Path=/vehiculos/**
            - id: msvehiculos-categorias
              uri: lb://msvehiculos
              predicates:
                - Path=/categorias/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
