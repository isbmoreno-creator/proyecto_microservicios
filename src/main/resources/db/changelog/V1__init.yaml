databaseChangeLog:
  - changeSet:
      id: 1
      author: ms-reportes
      changes:
        - createTable:
            tableName: reporte
            columns:
              - column:
                  name: id
                  type: INT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: titulo
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: descripcion
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: tipo_reporte
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: total_reservas
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: monto_total
                  type: DECIMAL(10, 2)
              - column:
                  name: activo
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: fecha_generacion
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: periodo_inicio
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: periodo_fin
                  type: DATE
                  constraints:
                    nullable: false
        - insert:
            tableName: reporte
            columns:
              - column:
                  name: titulo
                  value: "Reporte Enero"
              - column:
                  name: descripcion
                  value: "Reporte del mes de enero"
              - column:
                  name: tipo_reporte
                  value: "MENSUAL"
              - column:
                  name: total_reservas
                  valueNumeric: 10
              - column:
                  name: monto_total
                  valueNumeric: 50000
              - column:
                  name: activo
                  valueBoolean: true
              - column:
                  name: fecha_generacion
                  valueDate: "2025-01-31"
              - column:
                  name: periodo_inicio
                  valueDate: "2025-01-01"
              - column:
                  name: periodo_fin
                  valueDate: "2025-01-31"
        - insert:
            tableName: reporte
            columns:
              - column:
                  name: titulo
                  value: "Reporte Febrero"
              - column:
                  name: descripcion
                  value: "Reporte del mes de febrero"
              - column:
                  name: tipo_reporte
                  value: "MENSUAL"
              - column:
                  name: total_reservas
                  valueNumeric: 15
              - column:
                  name: monto_total
                  valueNumeric: 750000
              - column:
                  name: activo
                  valueBoolean: true
              - column:
                  name: fecha_generacion
                  valueDate: "2025-02-28"
              - column:
                  name: periodo_inicio
                  valueDate: "2025-02-01"
              - column:
                  name: periodo_fin
                  valueDate: "2025-02-28"
        - insert:
            tableName: reporte
            columns:
              - column:
                  name: titulo
                  value: "Reporte Marzo"
              - column:
                  name: descripcion
                  value: "Reporte del mes de marzo"
              - column:
                  name: tipo_reporte
                  value: "MENSUAL"
              - column:
                  name: total_reservas
                  valueNumeric: 20
              - column:
                  name: monto_total
                  valueNumeric: 1000000
              - column:
                  name: activo
                  valueBoolean: true
              - column:
                  name: fecha_generacion
                  valueDate: "2025-03-31"
              - column:
                  name: periodo_inicio
                  valueDate: "2025-03-01"
              - column:
                  name: periodo_fin
                  valueDate: "2025-03-31"



